<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ContentPilot — Content Bank</title>
<link rel="stylesheet" href="shared.css"/>
<style>
body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top-nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;min-height:56px}
.bank-layout{display:flex;flex:1;overflow:hidden}
.bank-sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.bank-main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.bank-header{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.bank-header h2{font-size:20px}
.bank-header p{font-size:13px;color:var(--text3);margin-top:2px}
.bank-content{flex:1;overflow-y:auto;padding:24px 28px}
.bank-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.bank-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:flex;flex-direction:column;gap:2px}
.bank-stat strong{font-size:22px;font-family:'Clash Display',sans-serif}
.bank-stat span{font-size:12px;color:var(--text3)}
.bank-toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 14px;font-size:13px;font-family:'Satoshi',sans-serif;width:220px;outline:none;flex:1;max-width:280px}
.search-input:focus{border-color:var(--accent)}
.filter-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 12px;font-size:13px;font-family:'Satoshi',sans-serif;cursor:pointer;outline:none}
.view-toggle{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-left:auto}
.vtbtn{padding:6px 12px;border-radius:5px;border:none;background:none;color:var(--text3);font-size:14px;cursor:pointer;transition:all 0.15s}
.vtbtn.active{background:var(--accent);color:#fff}
.bank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.bank-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative}
.bank-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow)}
.bank-card-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.bank-card:hover .bank-card-actions{opacity:1}
.caction{background:var(--bg3);border:none;border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer;color:var(--text2)}
.caction:hover{background:var(--border)}
.bank-list{display:flex;flex-direction:column;gap:8px}
.bank-list-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px}
.bank-list-item:hover{border-color:var(--accent)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state h3{font-size:18px;color:var(--text2);margin-bottom:8px}
.source-badge{font-size:10px;padding:2px 8px;background:rgba(108,99,255,0.1);color:var(--accent2);border-radius:4px;font-weight:700}
</style>
</head>
<body>

<nav class="top-nav" style="background:var(--bg2);border-bottom:1px solid var(--border)">
  <div style="display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:1;overflow:hidden">
    <a href="dashboard.html" class="nav-logo" style="flex-shrink:0">ContentPilot</a>
    <span style="color:var(--text3);font-size:18px;font-weight:200;flex-shrink:0">/</span>
    <span style="font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Content Bank</span>
  </div>
  <div class="nav-actions" style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <button class="btn-primary" onclick="openAdd()">+ Add Idea</button>
    <div class="avatar" id="nav-avatar">?</div>
  </div>
</nav>

<div class="bank-layout">
  <div class="bank-sidebar">
    <div style="padding:8px 10px 16px;border-bottom:1px solid var(--border);margin-bottom:8px"><h3 style="font-size:14px;font-weight:700">🗂️ Content Bank</h3></div>
    <div class="sidebar-section">Browse</div>
    <div class="sidebar-item active" id="f-all" onclick="setFilter('all',this)"><span class="icon">📋</span> All Ideas</div>
    <div class="sidebar-item" id="f-idea" onclick="setFilter('idea',this)"><span class="icon">💡</span> Ideas</div>
    <div class="sidebar-item" id="f-ready" onclick="setFilter('ready',this)"><span class="icon">✅</span> Ready</div>
    <div class="sidebar-item" id="f-live" onclick="setFilter('live',this)"><span class="icon">🚀</span> Live</div>
    <div class="sidebar-section">By Source</div>
    <div class="sidebar-item" id="f-copywriter" onclick="setFilter('copywriter',this)"><span class="icon">🤖</span> From AI</div>
    <div class="sidebar-item" id="f-manual" onclick="setFilter('manual',this)"><span class="icon">✏️</span> Manual Entry</div>
    <div class="sidebar-section">Tools</div>
    <div class="sidebar-item" onclick="location.href='copywriter.html'"><span class="icon">✍️</span> Copywriter</div>
    <div class="sidebar-item" onclick="location.href='calendar.html'"><span class="icon">📅</span> Calendar</div>
    <div class="sidebar-item" onclick="location.href='performance.html'"><span class="icon">📊</span> Performance</div>
  </div>

  <div class="bank-main">
    <div class="bank-header">
      <div><h2 id="bank-title">All Ideas</h2><p>Store, organize, and push to calendar</p></div>
    </div>
    <div class="bank-content">
      <div id="stats-area"></div>
      <div class="bank-toolbar">
        <input class="search-input" id="b-search" placeholder="🔍 Search ideas..." oninput="renderBank()"/>
        <select class="filter-select" id="b-platform" onchange="renderBank()">
          <option value="">All Platforms</option>
          <option>Instagram Reels</option><option>Instagram Post</option><option>TikTok</option>
          <option>YouTube Shorts</option><option>LinkedIn</option><option>Twitter / X</option><option>Blog</option>
        </select>
        <select class="filter-select" id="b-pillar" onchange="renderBank()">
          <option value="">All Pillars</option>
          <option>Educational</option><option>Entertainment</option><option>Inspirational</option>
          <option>Promotional</option><option>Behind the Scenes</option>
        </select>
        <div class="view-toggle">
          <button class="vtbtn active" id="vt-grid" onclick="setVM('grid')">⊞</button>
          <button class="vtbtn" id="vt-list" onclick="setVM('list')">☰</button>
        </div>
      </div>
      <div id="bank-container"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h2 id="item-modal-title">Add New Idea</h2>
      <button class="modal-close" onclick="closeItemModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Title *</label><input type="text" class="input-field" id="item-title" placeholder="Content idea title..."/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Platform</label>
        <select class="input-field" id="item-platform">
          <option value="">Select platform...</option>
          <option>Instagram Reels</option><option>Instagram Post</option><option>Instagram Story</option>
          <option>YouTube Shorts</option><option>YouTube Video</option><option>TikTok</option>
          <option>LinkedIn</option><option>Twitter / X</option><option>Google Ads</option>
          <option>Meta Ads</option><option>Email</option><option>Blog</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="input-field" id="item-status">
          <option value="idea">Idea</option><option value="in-progress">In Progress</option>
          <option value="review">Review</option><option value="ready">Ready</option><option value="live">Live</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Content Pillar</label>
        <select class="input-field" id="item-pillar">
          <option value="">Select pillar...</option>
          <option>Educational</option><option>Entertainment</option><option>Inspirational</option>
          <option>Promotional</option><option>Behind the Scenes</option><option>User Generated Content</option>
          <option>Product Showcase</option><option>Testimonial / Social Proof</option><option>Trend / Challenge</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Content Structure</label>
        <select class="input-field" id="item-structure">
          <option value="">Select structure...</option>
          <option>Hook → Value → CTA</option><option>Problem → Solution → CTA</option>
          <option>Story → Lesson → CTA</option><option>List / Tips Format</option>
          <option>Before → After</option><option>Tutorial / How-To</option>
          <option>Talking Head</option><option>Voiceover + B-Roll</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Objective</label>
      <select class="input-field" id="item-objective">
        <option value="">Select objective...</option>
        <option>Brand Awareness</option><option>Lead Generation</option><option>Sales / Conversion</option>
        <option>Engagement</option><option>Education</option><option>Entertainment</option>
        <option>Community Building</option><option>Product Launch</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Description / Idea Notes</label><textarea class="input-field" id="item-desc" rows="3" placeholder="Describe the content idea..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Reference Link</label><input type="url" class="input-field" id="item-ref-link" placeholder="https://..."/></div>
      <div class="form-group"><label class="form-label">Live Link</label><input type="url" class="input-field" id="item-live-link" placeholder="https://..."/></div>
    </div>
    <div class="form-group"><label class="form-label">Script / Copy</label><textarea class="input-field" id="item-script" rows="5" placeholder="Full script, caption, or copy..."></textarea></div>
    <div class="form-group"><label class="form-label">Tags (comma separated)</label><input type="text" class="input-field" id="item-tags" placeholder="e.g. product launch, summer, Q3"/></div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:8px">
      <button onclick="saveAndPush()" style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--accent3);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">📅 Save & Push to Calendar</button>
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="closeItemModal()">Cancel</button>
        <button class="btn-primary" id="save-item-btn" onclick="saveItem()">Save Idea</button>
      </div>
    </div>
  </div>
</div>

<div id="global-toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentFilter='all', viewMode='grid', editingId=null, allItems=[];

(async()=>{
  const user=await Auth.requireAuth();
  if(!user) return;
  document.getElementById('nav-avatar').textContent=user.avatar;
  await refresh();
})();

async function refresh(){ allItems=await DB.getBankItems(); renderBank(); }

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  const titles={all:'All Ideas',idea:'Ideas',ready:'Ready to Publish',live:'Live Content',copywriter:'From AI Copywriter',manual:'Manual Entries'};
  document.getElementById('bank-title').textContent=titles[f]||f;
  renderBank();
}

function setVM(m){
  viewMode=m;
  document.getElementById('vt-grid').classList.toggle('active',m==='grid');
  document.getElementById('vt-list').classList.toggle('active',m==='list');
  renderBank();
}

function getItems(){
  let items=[...allItems];
  if(currentFilter==='copywriter') items=items.filter(i=>i.source==='copywriter');
  else if(currentFilter==='manual') items=items.filter(i=>i.source!=='copywriter');
  else if(['idea','in-progress','review','ready','live'].includes(currentFilter)) items=items.filter(i=>i.status===currentFilter);
  const q=(document.getElementById('b-search')?.value||'').toLowerCase();
  const pl=document.getElementById('b-platform')?.value||'';
  const pi=document.getElementById('b-pillar')?.value||'';
  if(q) items=items.filter(i=>i.title.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q));
  if(pl) items=items.filter(i=>i.platform===pl);
  if(pi) items=items.filter(i=>i.pillar===pi);
  return items;
}

function renderBank(){
  const items=getItems();
  document.getElementById('stats-area').innerHTML=`<div class="bank-stats">
    <div class="bank-stat"><strong>${allItems.length}</strong><span>Total</span></div>
    <div class="bank-stat"><strong>${allItems.filter(i=>i.status==='idea').length}</strong><span>Ideas</span></div>
    <div class="bank-stat"><strong>${allItems.filter(i=>i.status==='ready').length}</strong><span>Ready</span></div>
    <div class="bank-stat"><strong>${allItems.filter(i=>i.status==='live').length}</strong><span>Live</span></div>
    <div class="bank-stat"><strong>${allItems.filter(i=>i.source==='copywriter').length}</strong><span>From AI</span></div>
  </div>`;
  const c=document.getElementById('bank-container');
  if(!items.length){
    c.innerHTML=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🗂️</div><h3>No ideas yet</h3><p>Add ideas or generate content from the Copywriter</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn-primary" onclick="openAdd()">+ Add Idea</button><button class="btn-ghost" onclick="location.href='copywriter.html'">✍️ Copywriter</button></div></div>`;
    return;
  }
  if(viewMode==='grid'){c.innerHTML=`<div class="bank-grid">${items.map(renderCard).join('')}</div>`;}
  else{c.innerHTML=`<div class="bank-list">${items.map(renderListItem).join('')}</div>`;}
}

function renderCard(i){
  return`<div class="bank-card" onclick="openEdit('${i.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:15px;font-weight:700;line-height:1.4;flex:1">${i.title}</div>
      <div class="bank-card-actions">
        <button class="caction" onclick="event.stopPropagation();pushToCalendar('${i.id}')" title="Push to Calendar">📅</button>
        <button class="caction" onclick="event.stopPropagation();delItem('${i.id}')" title="Delete">🗑</button>
      </div>
    </div>
    <div style="font-size:13px;color:var(--text3);line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${i.description||i.script||'No description'}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span class="tag ${STATUS_COLORS[i.status]||'tag-blue'}">${STATUS_LABELS[i.status]||i.status}</span>
      ${i.platform?`<span class="tag tag-blue" style="font-size:11px">${i.platform}</span>`:''}
      ${i.pillar?`<span class="tag tag-purple" style="font-size:11px">${i.pillar}</span>`:''}
      ${i.source==='copywriter'?`<span class="source-badge">AI</span>`:''}
      <span style="font-size:11px;color:var(--text3);margin-left:auto">${formatDate(i.createdAt)}</span>
    </div>
  </div>`;
}

function renderListItem(i){
  return`<div class="bank-list-item" onclick="openEdit('${i.id}')">
    <span style="font-size:20px">${i.source==='copywriter'?'🤖':'💡'}</span>
    <div style="font-size:14px;font-weight:600;flex:1">${i.title}</div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      ${i.platform?`<span class="tag tag-blue" style="font-size:11px">${i.platform}</span>`:''}
      <span class="tag ${STATUS_COLORS[i.status]||'tag-blue'}">${STATUS_LABELS[i.status]||i.status}</span>
      <span style="font-size:12px;color:var(--text3)">${formatDate(i.createdAt)}</span>
      <button onclick="event.stopPropagation();pushToCalendar('${i.id}')" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-size:14px">📅</button>
      <button onclick="event.stopPropagation();delItem('${i.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px">🗑</button>
    </div>
  </div>`;
}

function openAdd(){
  editingId=null;
  document.getElementById('item-modal-title').textContent='Add New Idea';
  ['item-title','item-desc','item-script','item-ref-link','item-live-link','item-tags'].forEach(id=>document.getElementById(id).value='');
  ['item-platform','item-pillar','item-structure','item-objective'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('item-status').value='idea';
  document.getElementById('item-modal').classList.add('open');
}

function openEdit(id){
  const i=allItems.find(x=>x.id===id);if(!i)return;
  editingId=id;
  document.getElementById('item-modal-title').textContent='Edit Idea';
  document.getElementById('item-title').value=i.title||'';
  document.getElementById('item-platform').value=i.platform||'';
  document.getElementById('item-status').value=i.status||'idea';
  document.getElementById('item-pillar').value=i.pillar||'';
  document.getElementById('item-structure').value=i.structure||'';
  document.getElementById('item-objective').value=i.objective||'';
  document.getElementById('item-desc').value=i.description||'';
  document.getElementById('item-ref-link').value=i.refLink||'';
  document.getElementById('item-live-link').value=i.liveLink||'';
  document.getElementById('item-script').value=i.script||'';
  document.getElementById('item-tags').value=(i.tags||[]).join(', ');
  document.getElementById('item-modal').classList.add('open');
}

function closeItemModal(){document.getElementById('item-modal').classList.remove('open');}

function getFormData(){
  const tags=document.getElementById('item-tags').value;
  return{
    id:editingId||null,
    title:document.getElementById('item-title').value.trim(),
    platform:document.getElementById('item-platform').value,
    status:document.getElementById('item-status').value,
    pillar:document.getElementById('item-pillar').value,
    structure:document.getElementById('item-structure').value,
    objective:document.getElementById('item-objective').value,
    description:document.getElementById('item-desc').value,
    refLink:document.getElementById('item-ref-link').value,
    liveLink:document.getElementById('item-live-link').value,
    script:document.getElementById('item-script').value,
    tags:tags?tags.split(',').map(t=>t.trim()).filter(Boolean):[],
    source:'manual'
  };
}

async function saveItem(){
  const data=getFormData();
  if(!data.title)return showToast('Title is required','error');
  const btn=document.getElementById('save-item-btn');
  btn.disabled=true;btn.textContent='Saving...';
  const saved=await DB.saveBankItem(data);
  btn.disabled=false;btn.textContent='Save Idea';
  if(!saved){showToast('Error saving','error');return;}
  showToast(editingId?'Updated!':'Idea saved!','success');
  closeItemModal();await refresh();
}

async function saveAndPush(){
  const data=getFormData();
  if(!data.title)return showToast('Title is required','error');
  const saved=await DB.saveBankItem(data);
  if(!saved){showToast('Error saving','error');return;}
  DB.setPending('calendar_item',{title:saved.title,script:saved.script||saved.description,platform:saved.platform});
  window.location.href='calendar.html';
}

function pushToCalendar(id){
  const i=allItems.find(x=>x.id===id);if(!i)return;
  DB.setPending('calendar_item',{title:i.title,script:i.script||i.description,platform:i.platform,pillar:i.pillar,objective:i.objective});
  window.location.href='calendar.html';
}

async function delItem(id){
  if(!confirm('Delete this idea?'))return;
  await DB.deleteBankItem(id);showToast('Deleted','info');await refresh();
}

document.getElementById('item-modal').addEventListener('click',function(e){if(e.target===this)closeItemModal();});
</script>
</body>
</html>
