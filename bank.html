<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ContentPilot — Content Bank</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .top-nav { flex-shrink: 0; }
    .bank-layout { display: flex; flex: 1; overflow: hidden; }

    .bank-sidebar {
      width: 220px; flex-shrink: 0; background: var(--bg2);
      border-right: 1px solid var(--border); padding: 16px 10px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-logo { padding: 8px 10px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }

    .bank-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .bank-header {
      padding: 20px 28px; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bank-header h2 { font-size: 20px; }
    .bank-header p { font-size: 13px; color: var(--text3); margin-top: 2px; }

    .bank-content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* Grid view */
    .bank-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .bank-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .bank-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow); }
    .bank-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .bank-card-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; }
    .bank-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .bank-card:hover .bank-card-actions { opacity: 1; }
    .card-action-btn { background: var(--bg3); border: none; border-radius: 6px; padding: 5px 8px; font-size: 13px; cursor: pointer; color: var(--text2); transition: background 0.15s; }
    .card-action-btn:hover { background: var(--border); }
    .bank-card-desc { font-size: 13px; color: var(--text3); line-height: 1.5; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .bank-card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .bank-card-date { font-size: 11px; color: var(--text3); margin-left: auto; }

    /* List view */
    .bank-list { display: flex; flex-direction: column; gap: 8px; }
    .bank-list-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 18px; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 16px;
    }
    .bank-list-item:hover { border-color: var(--accent); background: var(--card2); }
    .bank-list-title { font-size: 14px; font-weight: 600; flex: 1; }
    .bank-list-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* Filter / Search */
    .bank-toolbar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
    }
    .search-input {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 8px 14px; font-size: 13px; font-family: 'Satoshi', sans-serif;
      width: 240px; outline: none; flex: 1; max-width: 300px;
    }
    .search-input:focus { border-color: var(--accent); }
    .filter-select {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text2); padding: 8px 12px; font-size: 13px; font-family: 'Satoshi', sans-serif; cursor: pointer;
    }
    .view-toggle { display: flex; background: var(--bg3); border-radius: 8px; padding: 3px; margin-left: auto; }
    .view-toggle-btn {
      padding: 6px 12px; border-radius: 5px; border: none; background: none;
      color: var(--text3); font-size: 14px; cursor: pointer; transition: all 0.15s;
    }
    .view-toggle-btn.active { background: var(--accent); color: #fff; }

    /* Stats */
    .bank-stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .bank-stat {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 18px; display: flex; flex-direction: column; gap: 2px;
    }
    .bank-stat strong { font-size: 22px; font-family: 'Clash Display', sans-serif; }
    .bank-stat span { font-size: 12px; color: var(--text3); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; margin-bottom: 20px; }

    .source-badge { font-size: 10px; padding: 2px 8px; background: rgba(108,99,255,0.1); color: var(--accent2); border-radius: 4px; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="dashboard.html" class="nav-logo">ContentPilot</a>
      <span style="color:var(--text3);font-size:20px;font-weight:200">/</span>
      <span style="font-size:14px;color:var(--text2);font-weight:600">Content Bank</span>
    </div>
    <div class="nav-actions">
      <button class="btn-primary" onclick="openAddItem()">+ Add Idea</button>
      <div class="avatar" id="nav-avatar">?</div>
    </div>
  </nav>

  <div class="bank-layout">
    <!-- Sidebar -->
    <div class="bank-sidebar">
      <div class="sidebar-logo"><h3>🗂️ Content Bank</h3></div>
      <div class="sidebar-section">Browse</div>
      <div class="sidebar-item active" id="filter-all" onclick="setFilter('all', this)"><span class="icon">📋</span> All Ideas</div>
      <div class="sidebar-item" id="filter-idea" onclick="setFilter('idea', this)"><span class="icon">💡</span> Ideas</div>
      <div class="sidebar-item" id="filter-ready" onclick="setFilter('ready', this)"><span class="icon">✅</span> Ready</div>
      <div class="sidebar-item" id="filter-live" onclick="setFilter('live', this)"><span class="icon">🚀</span> Live</div>
      <div class="sidebar-section">By Source</div>
      <div class="sidebar-item" id="filter-copywriter" onclick="setFilter('copywriter', this)"><span class="icon">✍️</span> From Copywriter</div>
      <div class="sidebar-item" id="filter-manual" onclick="setFilter('manual', this)"><span class="icon">✏️</span> Manual Entry</div>
      <div class="sidebar-section">Tools</div>
      <div class="sidebar-item" onclick="window.location.href='copywriter.html'"><span class="icon">✍️</span> Copywriter</div>
      <div class="sidebar-item" onclick="window.location.href='calendar.html'"><span class="icon">📅</span> Calendar</div>
      <div class="sidebar-item" onclick="window.location.href='performance.html'"><span class="icon">📊</span> Performance</div>
    </div>

    <!-- Main -->
    <div class="bank-main">
      <div class="bank-header">
        <div>
          <h2 id="bank-section-title">All Ideas</h2>
          <p>Your content repository — store, organize, and push to calendar</p>
        </div>
      </div>
      <div class="bank-content">
        <div id="bank-stats-container"></div>
        <div class="bank-toolbar">
          <input class="search-input" id="bank-search" placeholder="🔍 Search ideas..." oninput="renderBank()" />
          <select class="filter-select" id="bank-filter-platform" onchange="renderBank()">
            <option value="">All Platforms</option>
            <option>Instagram Reels</option><option>TikTok</option><option>YouTube Shorts</option>
            <option>LinkedIn</option><option>Twitter / X</option><option>Blog</option>
          </select>
          <select class="filter-select" id="bank-filter-pillar" onchange="renderBank()">
            <option value="">All Pillars</option>
            <option>Educational</option><option>Entertainment</option><option>Inspirational</option>
            <option>Promotional</option><option>Behind the Scenes</option>
          </select>
          <div class="view-toggle">
            <button class="view-toggle-btn active" id="btn-grid" onclick="setViewMode('grid')">⊞</button>
            <button class="view-toggle-btn" id="btn-list" onclick="setViewMode('list')">☰</button>
          </div>
        </div>
        <div id="bank-container"></div>
      </div>
    </div>
  </div>

  <!-- Add Item Modal -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal" style="max-width:700px">
      <div class="modal-header">
        <h2 id="item-modal-title">Add New Idea</h2>
        <button class="modal-close" onclick="closeItemModal()">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" class="input-field" id="item-title" placeholder="Content idea title..." />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Platform</label>
          <select class="input-field" id="item-platform">
            <option value="">Select platform...</option>
            <option>Instagram Reels</option><option>Instagram Post</option><option>Instagram Story</option>
            <option>YouTube Shorts</option><option>YouTube Video</option><option>TikTok</option>
            <option>LinkedIn</option><option>Twitter / X</option><option>Google Ads</option>
            <option>Meta Ads</option><option>Email</option><option>Blog</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="input-field" id="item-status">
            <option value="idea">Idea</option>
            <option value="in-progress">In Progress</option>
            <option value="review">Review</option>
            <option value="ready">Ready</option>
            <option value="live">Live</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Content Pillar</label>
          <select class="input-field" id="item-pillar">
            <option value="">Select pillar...</option>
            <option>Educational</option><option>Entertainment</option><option>Inspirational</option>
            <option>Promotional</option><option>Behind the Scenes</option>
            <option>User Generated Content</option><option>Product Showcase</option>
            <option>Testimonial / Social Proof</option><option>Trend / Challenge</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Content Structure</label>
          <select class="input-field" id="item-structure">
            <option value="">Select structure...</option>
            <option>Hook → Value → CTA</option><option>Problem → Solution → CTA</option>
            <option>Story → Lesson → CTA</option><option>List / Tips Format</option>
            <option>Before → After</option><option>Tutorial / How-To</option>
            <option>Talking Head</option><option>Voiceover + B-Roll</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Objective</label>
        <select class="input-field" id="item-objective">
          <option value="">Select objective...</option>
          <option>Brand Awareness</option><option>Lead Generation</option><option>Sales / Conversion</option>
          <option>Engagement</option><option>Education</option><option>Entertainment</option>
          <option>Community Building</option><option>Product Launch</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Description / Idea Notes</label>
        <textarea class="input-field" id="item-desc" rows="3" placeholder="Describe the content idea..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Reference Link</label>
          <input type="url" class="input-field" id="item-ref-link" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label class="form-label">Live Link</label>
          <input type="url" class="input-field" id="item-live-link" placeholder="https://..." />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Script / Copy</label>
        <textarea class="input-field" id="item-script" rows="5" placeholder="Full script, caption, or copy..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input type="text" class="input-field" id="item-tags" placeholder="e.g. product launch, summer, Q3" />
      </div>

      <div class="form-group">
        <label class="form-label">Upload Files</label>
        <input type="file" class="input-field" id="item-files" multiple accept=".pdf,.doc,.docx,.txt,.jpg,.png" style="padding:8px" />
      </div>

      <div style="display:flex;gap:10px;justify-content:space-between;margin-top:8px">
        <button onclick="pushToCalendar()" style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--accent3);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📅 Save & Push to Calendar</button>
        <div style="display:flex;gap:10px">
          <button class="btn-ghost" onclick="closeItemModal()">Cancel</button>
          <button class="btn-primary" onclick="saveItem()">Save Idea</button>
        </div>
      </div>
    </div>
  </div>

  <div id="global-toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);</script>
  <script>
    (async()=>{window._currentUser = await Auth.requireAuth(); if(!window._currentUser) return;
    if(window._currentUser) document.getElementById('nav-avatar').textContent = user.avatar || user.name.charAt(0);

    let currentFilter = 'all';
    let viewMode = 'grid';
    let editingId = null;

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      const titles = { all: 'All Ideas', idea: 'Ideas', ready: 'Ready to Publish', live: 'Live Content', copywriter: 'From Copywriter', manual: 'Manual Entries' };
      document.getElementById('bank-section-title').textContent = titles[f] || f;
      renderBank();
    }

    function setViewMode(m) {
      viewMode = m;
      document.getElementById('btn-grid').classList.toggle('active', m === 'grid');
      document.getElementById('btn-list').classList.toggle('active', m === 'list');
      renderBank();
    }

    function getItems() {
      let items = DB.get('bank_items');
      const q = document.getElementById('bank-search')?.value.toLowerCase() || '';
      const platform = document.getElementById('bank-filter-platform')?.value || '';
      const pillar = document.getElementById('bank-filter-pillar')?.value || '';
      if (currentFilter === 'copywriter') items = items.filter(i => i.source === 'copywriter');
      else if (currentFilter === 'manual') items = items.filter(i => i.source !== 'copywriter');
      else if (['idea','in-progress','review','ready','live'].includes(currentFilter)) items = items.filter(i => i.status === currentFilter);
      if (q) items = items.filter(i => i.title.toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q));
      if (platform) items = items.filter(i => i.platform === platform);
      if (pillar) items = items.filter(i => i.pillar === pillar);
      return items;
    }

    function renderBank() {
      const items = getItems();
      const all = DB.get('bank_items');

      // Stats
      document.getElementById('bank-stats-container').innerHTML = `
        <div class="bank-stats">
          <div class="bank-stat"><strong>${all.length}</strong><span>Total Ideas</span></div>
          <div class="bank-stat"><strong>${all.filter(i=>i.status==='idea').length}</strong><span>Raw Ideas</span></div>
          <div class="bank-stat"><strong>${all.filter(i=>i.status==='ready').length}</strong><span>Ready</span></div>
          <div class="bank-stat"><strong>${all.filter(i=>i.status==='live').length}</strong><span>Live</span></div>
          <div class="bank-stat"><strong>${all.filter(i=>i.source==='copywriter').length}</strong><span>From AI</span></div>
        </div>`;

      const container = document.getElementById('bank-container');
      if (!items.length) {
        container.innerHTML = `<div class="empty-state">
          <div style="font-size:48px;margin-bottom:12px">🗂️</div>
          <h3>No ideas yet</h3>
          <p>Start adding content ideas or use the Copywriter to generate content</p>
          <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn-primary" onclick="openAddItem()">+ Add Idea</button>
            <button class="btn-ghost" onclick="window.location.href='copywriter.html'">✍️ Go to Copywriter</button>
          </div>
        </div>`;
        return;
      }

      if (viewMode === 'grid') {
        container.innerHTML = `<div class="bank-grid">${items.map(renderBankCard).join('')}</div>`;
      } else {
        container.innerHTML = `<div class="bank-list">${items.map(renderBankListItem).join('')}</div>`;
      }
    }

    function renderBankCard(item) {
      const tags = (item.tags || []).slice(0, 3);
      return `<div class="bank-card" onclick="openEditItem('${item.id}')">
        <div class="bank-card-header">
          <div class="bank-card-title">${item.title}</div>
          <div class="bank-card-actions">
            <button class="card-action-btn" onclick="event.stopPropagation();pushItemToCalendar('${item.id}')" title="Push to Calendar">📅</button>
            <button class="card-action-btn" onclick="event.stopPropagation();deleteItem('${item.id}')" title="Delete">🗑</button>
          </div>
        </div>
        <div class="bank-card-desc">${item.description || item.script || 'No description'}</div>
        <div class="bank-card-footer">
          <span class="tag ${STATUS_COLORS[item.status]||'tag-blue'}">${STATUS_LABELS[item.status]||item.status}</span>
          ${item.platform ? `<span class="tag tag-blue" style="font-size:11px">${item.platform}</span>` : ''}
          ${item.pillar ? `<span class="tag tag-purple" style="font-size:11px">${item.pillar}</span>` : ''}
          ${item.source === 'copywriter' ? `<span class="source-badge">AI</span>` : ''}
          <span class="bank-card-date">${formatDate(item.createdAt)}</span>
        </div>
      </div>`;
    }

    function renderBankListItem(item) {
      return `<div class="bank-list-item" onclick="openEditItem('${item.id}')">
        <span style="font-size:20px">${item.source === 'copywriter' ? '🤖' : '💡'}</span>
        <div class="bank-list-title">${item.title}</div>
        <div class="bank-list-meta">
          ${item.platform ? `<span class="tag tag-blue" style="font-size:11px">${item.platform}</span>` : ''}
          <span class="tag ${STATUS_COLORS[item.status]||'tag-blue'}">${STATUS_LABELS[item.status]||item.status}</span>
          <span style="font-size:12px;color:var(--text3)">${formatDate(item.createdAt)}</span>
          <button onclick="event.stopPropagation();pushItemToCalendar('${item.id}')" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-size:14px" title="Push to calendar">📅</button>
          <button onclick="event.stopPropagation();deleteItem('${item.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px">🗑</button>
        </div>
      </div>`;
    }

    function openAddItem() {
      editingId = null;
      document.getElementById('item-modal-title').textContent = 'Add New Idea';
      ['item-title','item-desc','item-script','item-ref-link','item-live-link','item-tags'].forEach(id => document.getElementById(id).value = '');
      ['item-platform','item-status','item-pillar','item-structure','item-objective'].forEach(id => document.getElementById(id).value = id === 'item-status' ? 'idea' : '');
      document.getElementById('item-modal').classList.add('open');
    }

    function openEditItem(id) {
      const items = DB.get('bank_items');
      const item = items.find(i => i.id === id);
      if (!item) return;
      editingId = id;
      document.getElementById('item-modal-title').textContent = 'Edit Idea';
      document.getElementById('item-title').value = item.title || '';
      document.getElementById('item-platform').value = item.platform || '';
      document.getElementById('item-status').value = item.status || 'idea';
      document.getElementById('item-pillar').value = item.pillar || '';
      document.getElementById('item-structure').value = item.structure || '';
      document.getElementById('item-objective').value = item.objective || '';
      document.getElementById('item-desc').value = item.description || '';
      document.getElementById('item-ref-link').value = item.refLink || '';
      document.getElementById('item-live-link').value = item.liveLink || '';
      document.getElementById('item-script').value = item.script || '';
      document.getElementById('item-tags').value = (item.tags || []).join(', ');
      document.getElementById('item-modal').classList.add('open');
    }

    function closeItemModal() { document.getElementById('item-modal').classList.remove('open'); }

    function saveItem(pushCal = false) {
      const title = document.getElementById('item-title').value.trim();
      if (!title) return showToast('Title is required', 'error');
      const items = DB.get('bank_items');
      const tagsRaw = document.getElementById('item-tags').value;
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const itemData = {
        id: editingId || genId(),
        title,
        platform: document.getElementById('item-platform').value,
        status: document.getElementById('item-status').value,
        pillar: document.getElementById('item-pillar').value,
        structure: document.getElementById('item-structure').value,
        objective: document.getElementById('item-objective').value,
        description: document.getElementById('item-desc').value,
        refLink: document.getElementById('item-ref-link').value,
        liveLink: document.getElementById('item-live-link').value,
        script: document.getElementById('item-script').value,
        tags, source: 'manual',
        updatedAt: new Date().toISOString(),
        createdAt: editingId ? (items.find(i => i.id === editingId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
      };
      if (editingId) {
        const idx = items.findIndex(i => i.id === editingId);
        items[idx] = itemData;
      } else {
        items.push(itemData);
      }
      DB.set('bank_items', items);
      closeItemModal();
      showToast(editingId ? 'Updated!' : 'Idea saved!', 'success');
      if (pushCal) pushItemToCalendar(itemData.id);
      else renderBank();
    }

    function pushToCalendar() {
      const title = document.getElementById('item-title').value.trim();
      if (!title) return showToast('Title is required', 'error');
      saveItem(false);
      // Get the last saved item
      const items = DB.get('bank_items');
      const last = items[items.length - 1];
      if (last) pushItemToCalendar(last.id);
    }

    function pushItemToCalendar(id) {
      const items = DB.get('bank_items');
      const item = items.find(i => i.id === id);
      if (!item) return;
      DB.setOne('pending_calendar_item', {
        title: item.title, script: item.script || item.description,
        platform: item.platform, pillar: item.pillar, objective: item.objective
      });
      window.location.href = 'calendar.html';
    }

    function deleteItem(id) {
      if (!confirm('Delete this idea?')) return;
      const items = DB.get('bank_items').filter(i => i.id !== id);
      DB.set('bank_items', items);
      showToast('Deleted', 'info');
      renderBank();
    }

    document.getElementById('item-modal').addEventListener('click', function(e) {
      if (e.target === this) closeItemModal();
    });

    renderBank();
  </script>
</body>
</html>
