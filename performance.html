<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ContentPilot — Performance</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .top-nav{flex-shrink:0}
    .perf-layout{display:flex;flex:1;overflow:hidden}
    .perf-sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
    .perf-main{flex:1;overflow-y:auto;padding:28px}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
    .kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
    .kpi-card.purple::after{background:var(--accent)}.kpi-card.blue::after{background:var(--accent3)}
    .kpi-card.green::after{background:var(--green)}.kpi-card.orange::after{background:var(--orange)}
    .kpi-card.pink::after{background:var(--pink)}.kpi-card.red::after{background:var(--red)}
    .kpi-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
    .kpi-value{font-size:28px;font-family:'Clash Display',sans-serif;font-weight:700}
    .perf-table{width:100%;border-collapse:collapse}
    .perf-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap}
    .perf-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle}
    .perf-row{cursor:pointer;transition:background 0.15s}
    .perf-row:hover{background:rgba(255,255,255,0.02)}
    .platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px}
    .platform-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
    .platform-metric{display:flex;justify-content:space-between;font-size:12px}
    .platform-metric span:first-child{color:var(--text3)}
    .platform-metric span:last-child{font-weight:700}
    .score-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:12px;font-weight:800;font-family:'Clash Display',sans-serif}
    .score-high{background:rgba(52,211,153,0.15);color:var(--green)}
    .score-mid{background:rgba(251,146,60,0.15);color:var(--orange)}
    .score-low{background:rgba(248,113,113,0.15);color:var(--red)}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .section-header h3{font-size:18px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
    .empty-state h3{font-size:18px;color:var(--text2);margin-bottom:8px}
    .log-btn{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--accent3);padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
    .log-btn:hover{background:rgba(56,189,248,0.2)}
  </style>
</head>
<body>
  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="dashboard.html" class="nav-logo">ContentPilot</a>
      <span style="color:var(--text3);font-size:20px;font-weight:200">/</span>
      <span style="font-size:14px;color:var(--text2);font-weight:600">Performance</span>
    </div>
    <div class="nav-actions">
      <button class="log-btn" onclick="openAdd()">+ Log Metrics</button>
      <div class="avatar" id="nav-avatar">?</div>
    </div>
  </nav>
  <div class="perf-layout">
    <div class="perf-sidebar">
      <div style="padding:8px 10px 16px;border-bottom:1px solid var(--border);margin-bottom:8px"><h3 style="font-size:14px;font-weight:700">📊 Performance</h3></div>
      <div class="sidebar-section">Views</div>
      <div class="sidebar-item active" id="nav-overview" onclick="setSection('overview',this)"><span class="icon">🏠</span> Overview</div>
      <div class="sidebar-item" id="nav-content" onclick="setSection('content',this)"><span class="icon">📋</span> By Content</div>
      <div class="sidebar-item" id="nav-platform" onclick="setSection('platform',this)"><span class="icon">📱</span> By Platform</div>
      <div class="sidebar-section">Tools</div>
      <div class="sidebar-item" onclick="location.href='copywriter.html'"><span class="icon">✍️</span> Copywriter</div>
      <div class="sidebar-item" onclick="location.href='calendar.html'"><span class="icon">📅</span> Calendar</div>
      <div class="sidebar-item" onclick="location.href='bank.html'"><span class="icon">🗂️</span> Content Bank</div>
    </div>
    <div class="perf-main" id="perf-main"><div style="text-align:center;padding:60px;color:var(--text3)">Loading...</div></div>
  </div>

  <!-- Metrics Modal -->
  <div class="modal-overlay" id="metrics-modal">
    <div class="modal" style="max-width:680px">
      <div class="modal-header">
        <h2 id="mm-title">Log Content Metrics</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group"><label class="form-label">Select Live Content (from Calendar)</label>
        <select class="input-field" id="m-task-select" onchange="prefill(this.value)"><option value="">Pick a live content piece...</option></select>
      </div>
      <div class="form-group"><label class="form-label">Title *</label><input type="text" class="input-field" id="m-title" placeholder="Content title..."/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Platform</label>
          <select class="input-field" id="m-platform">
            <option value="">Select platform...</option>
            <option>Instagram Reels</option><option>Instagram Post</option><option>TikTok</option>
            <option>YouTube Shorts</option><option>YouTube Video</option><option>LinkedIn</option>
            <option>Twitter / X</option><option>Facebook</option><option>Google Ads</option><option>Meta Ads</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Date Published</label><input type="date" class="input-field" id="m-date"/></div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:16px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">📈 Engagement</div>
        <div class="form-row-3">
          <div class="form-group"><label class="form-label">Views / Impressions</label><input type="number" class="input-field" id="m-views" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Likes</label><input type="number" class="input-field" id="m-likes" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Comments</label><input type="number" class="input-field" id="m-comments" placeholder="0" min="0"/></div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label class="form-label">Shares</label><input type="number" class="input-field" id="m-shares" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Saves</label><input type="number" class="input-field" id="m-saves" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Reach</label><input type="number" class="input-field" id="m-reach" placeholder="0" min="0"/></div>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:16px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">💰 Conversions</div>
        <div class="form-row-3">
          <div class="form-group"><label class="form-label">Clicks</label><input type="number" class="input-field" id="m-clicks" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Leads</label><input type="number" class="input-field" id="m-leads" placeholder="0" min="0"/></div>
          <div class="form-group"><label class="form-label">Conversions</label><input type="number" class="input-field" id="m-conversions" placeholder="0" min="0"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Spend (₹/$)</label><input type="number" class="input-field" id="m-spend" placeholder="0.00" step="0.01"/></div>
          <div class="form-group"><label class="form-label">Revenue</label><input type="number" class="input-field" id="m-revenue" placeholder="0.00" step="0.01"/></div>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:16px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">📱 Platform KPIs</div>
        <div class="form-row-3">
          <div class="form-group"><label class="form-label">Watch Time (min)</label><input type="number" class="input-field" id="m-watchtime" placeholder="0"/></div>
          <div class="form-group"><label class="form-label">Avg Duration (s)</label><input type="number" class="input-field" id="m-avgdur" placeholder="0"/></div>
          <div class="form-group"><label class="form-label">Followers Gained</label><input type="number" class="input-field" id="m-followers" placeholder="0"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">CTR (%)</label><input type="number" class="input-field" id="m-ctr" placeholder="0.00" step="0.01"/></div>
          <div class="form-group"><label class="form-label">Engagement Rate (%)</label><input type="number" class="input-field" id="m-er" placeholder="0.00" step="0.01"/></div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="input-field" id="m-notes" rows="2" placeholder="Any observations..."></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="save-metric-btn" onclick="saveMetric()">Save Metrics</button>
      </div>
    </div>
  </div>
  <div id="global-toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentSection='overview', editingId=null, allMetrics=[];

    (async()=>{
      const user=await Auth.requireAuth();
      if(!user) return;
      document.getElementById('nav-avatar').textContent=user.avatar;
      await refresh();
    })();

    async function refresh(){ allMetrics=await DB.getMetrics(); render(); }

    function setSection(s,el){
      currentSection=s;
      document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
      if(el) el.classList.add('active');
      render();
    }

    function render(){
      const c=document.getElementById('perf-main');
      if(currentSection==='overview') renderOverview(c);
      else if(currentSection==='content') renderContent(c);
      else if(currentSection==='platform') renderPlatform(c);
    }

    function fmt(n){
      if(!n||n===0) return '0';
      if(n>=1000000) return (n/1000000).toFixed(1)+'M';
      if(n>=1000) return (n/1000).toFixed(1)+'K';
      return String(n);
    }

    function calcER(m){
      if(!m.views||m.views===0) return '0.00';
      return (((m.likes||0)+(m.comments||0)+(m.shares||0)+(m.saves||0))/m.views*100).toFixed(2);
    }

    function calcScore(m){
      const er=parseFloat(calcER(m));
      const ctr=parseFloat(m.ctr||0);
      return Math.min(100,Math.round(er*10+ctr*5+(m.conversions?20:0)+(m.leads?10:0)));
    }

    function renderOverview(c){
      const tv=allMetrics.reduce((s,m)=>s+Number(m.views||0),0);
      const tl=allMetrics.reduce((s,m)=>s+Number(m.likes||0),0);
      const tle=allMetrics.reduce((s,m)=>s+Number(m.leads||0),0);
      const tr=allMetrics.reduce((s,m)=>s+Number(m.revenue||0),0);
      const tc=allMetrics.reduce((s,m)=>s+Number(m.conversions||0),0);
      const avgER=allMetrics.length?(allMetrics.reduce((s,m)=>s+parseFloat(calcER(m)),0)/allMetrics.length).toFixed(2):0;
      c.innerHTML=`
        <div style="margin-bottom:24px"><h2 style="font-size:22px;margin-bottom:4px">Performance Overview</h2><p style="color:var(--text3);font-size:13px">${allMetrics.length} content pieces tracked</p></div>
        <div class="kpi-grid">
          <div class="kpi-card purple"><div class="kpi-label">Total Views</div><div class="kpi-value">${fmt(tv)}</div></div>
          <div class="kpi-card blue"><div class="kpi-label">Total Likes</div><div class="kpi-value">${fmt(tl)}</div></div>
          <div class="kpi-card green"><div class="kpi-label">Avg Eng. Rate</div><div class="kpi-value">${avgER}%</div></div>
          <div class="kpi-card orange"><div class="kpi-label">Leads</div><div class="kpi-value">${fmt(tle)}</div></div>
          <div class="kpi-card pink"><div class="kpi-label">Conversions</div><div class="kpi-value">${fmt(tc)}</div></div>
          <div class="kpi-card red"><div class="kpi-label">Revenue</div><div class="kpi-value">₹${fmt(tr)}</div></div>
        </div>
        ${allMetrics.length===0?`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📊</div><h3>No metrics yet</h3><p>Log metrics for your live content</p><button class="btn-primary" onclick="openAdd()">+ Log First Metrics</button></div>`:`
        <div class="section-header"><h3>Top Performing Content</h3></div>
        <table class="perf-table"><thead><tr><th>Content</th><th>Platform</th><th>Views</th><th>ER%</th><th>Leads</th><th>Score</th><th></th></tr></thead>
        <tbody>${[...allMetrics].sort((a,b)=>Number(b.views||0)-Number(a.views||0)).slice(0,10).map(m=>{
          const sc=calcScore(m);const scClass=sc>=60?'score-high':sc>=30?'score-mid':'score-low';
          return`<tr class="perf-row" onclick="openEdit('${m.id}')"><td><strong>${m.title}</strong></td><td><span class="tag tag-blue" style="font-size:11px">${m.platform||'—'}</span></td><td>${fmt(m.views)}</td><td>${calcER(m)}%</td><td>${fmt(m.leads)}</td><td><div class="score-badge ${scClass}">${sc}</div></td><td><button onclick="event.stopPropagation();delMetric('${m.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px">🗑</button></td></tr>`;
        }).join('')}</tbody></table>`}`;
    }

    function renderContent(c){
      c.innerHTML=`<div style="margin-bottom:20px"><h2 style="font-size:20px">Content Performance</h2></div>
        ${allMetrics.length===0?'<div class="empty-state"><h3>No data yet</h3><p>Log metrics to see content performance</p></div>':`
        <table class="perf-table"><thead><tr><th>Content</th><th>Platform</th><th>Date</th><th>Views</th><th>Likes</th><th>Comments</th><th>Shares</th><th>ER%</th><th>CTR%</th><th>Leads</th><th>Revenue</th><th>Score</th></tr></thead>
        <tbody>${allMetrics.map(m=>{
          const sc=calcScore(m);const scClass=sc>=60?'score-high':sc>=30?'score-mid':'score-low';
          return`<tr class="perf-row" onclick="openEdit('${m.id}')"><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><strong>${m.title}</strong></td><td><span class="tag tag-blue" style="font-size:11px">${m.platform||'—'}</span></td><td style="font-size:12px;color:var(--text3)">${formatDate(m.date)}</td><td>${fmt(m.views)}</td><td>${fmt(m.likes)}</td><td>${fmt(m.comments)}</td><td>${fmt(m.shares)}</td><td>${calcER(m)}%</td><td>${m.ctr||0}%</td><td>${fmt(m.leads)}</td><td>₹${fmt(m.revenue)}</td><td><div class="score-badge ${scClass}">${sc}</div></td></tr>`;
        }).join('')}</tbody></table>`}`;
    }

    function renderPlatform(c){
      const platforms=[...new Set(allMetrics.map(m=>m.platform).filter(Boolean))];
      c.innerHTML=`<div style="margin-bottom:20px"><h2 style="font-size:20px">Platform Breakdown</h2></div>
        ${platforms.length===0?'<div class="empty-state"><h3>No platform data yet</h3></div>':`
        <div class="platform-grid">${platforms.map(p=>{
          const pm=allMetrics.filter(m=>m.platform===p);
          const tv=pm.reduce((s,m)=>s+Number(m.views||0),0);
          const tl=pm.reduce((s,m)=>s+Number(m.likes||0),0);
          const avgER=pm.length?(pm.reduce((s,m)=>s+parseFloat(calcER(m)),0)/pm.length).toFixed(1):0;
          return`<div class="platform-card"><div style="font-size:13px;font-weight:700;margin-bottom:4px">${p}</div><div style="font-size:11px;color:var(--text3);margin-bottom:10px">${pm.length} posts tracked</div><div class="platform-metric"><span>Views</span><span>${fmt(tv)}</span></div><div class="platform-metric"><span>Likes</span><span>${fmt(tl)}</span></div><div class="platform-metric"><span>Avg ER</span><span style="color:var(--green)">${avgER}%</span></div></div>`;
        }).join('')}</div>`}`;
    }

    async function openAdd(){
      editingId=null;
      document.getElementById('mm-title').textContent='Log Content Metrics';
      ['m-title','m-views','m-likes','m-comments','m-shares','m-saves','m-reach','m-clicks','m-leads','m-conversions','m-spend','m-revenue','m-watchtime','m-avgdur','m-followers','m-ctr','m-er','m-notes'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('m-platform').value='';
      document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
      // Load live tasks from Supabase
      const tasks=await DB.getTasks({status:'live'});
      const sel=document.getElementById('m-task-select');
      sel.innerHTML='<option value="">Pick a live content piece...</option>';
      tasks.forEach(t=>sel.innerHTML+=`<option value="${t.id}" data-platform="${t.platform||''}" data-date="${t.liveDate||''}">${t.title}${t.platform?' ('+t.platform+')':''}</option>`);
      document.getElementById('metrics-modal').classList.add('open');
    }

    async function openEdit(id){
      const m=allMetrics.find(x=>x.id===id);if(!m)return;
      editingId=id;
      document.getElementById('mm-title').textContent='Edit Metrics';
      document.getElementById('m-title').value=m.title||'';
      document.getElementById('m-platform').value=m.platform||'';
      document.getElementById('m-date').value=m.date||'';
      document.getElementById('m-views').value=m.views||'';
      document.getElementById('m-likes').value=m.likes||'';
      document.getElementById('m-comments').value=m.comments||'';
      document.getElementById('m-shares').value=m.shares||'';
      document.getElementById('m-saves').value=m.saves||'';
      document.getElementById('m-reach').value=m.reach||'';
      document.getElementById('m-clicks').value=m.clicks||'';
      document.getElementById('m-leads').value=m.leads||'';
      document.getElementById('m-conversions').value=m.conversions||'';
      document.getElementById('m-spend').value=m.spend||'';
      document.getElementById('m-revenue').value=m.revenue||'';
      document.getElementById('m-watchtime').value=m.watchTime||'';
      document.getElementById('m-avgdur').value=m.avgDuration||'';
      document.getElementById('m-followers').value=m.followers||'';
      document.getElementById('m-ctr').value=m.ctr||'';
      document.getElementById('m-er').value=m.er||'';
      document.getElementById('m-notes').value=m.notes||'';
      document.getElementById('metrics-modal').classList.add('open');
    }

    function prefill(taskId){
      if(!taskId) return;
      const opt=document.querySelector(`#m-task-select option[value="${taskId}"]`);
      if(!opt) return;
      // Find task in text
      const text=opt.textContent;
      document.getElementById('m-title').value=text.split('(')[0].trim();
      const platform=opt.dataset.platform||'';
      if(platform) document.getElementById('m-platform').value=platform;
      const date=opt.dataset.date||'';
      if(date) document.getElementById('m-date').value=date;
    }

    function closeModal(){document.getElementById('metrics-modal').classList.remove('open');}

    async function saveMetric(){
      const title=document.getElementById('m-title').value.trim();
      if(!title) return showToast('Title is required','error');
      const btn=document.getElementById('save-metric-btn');
      btn.disabled=true;btn.textContent='Saving...';
      const saved=await DB.saveMetric({
        id:editingId||null,title,
        platform:document.getElementById('m-platform').value,
        date:document.getElementById('m-date').value,
        views:Number(document.getElementById('m-views').value)||0,
        likes:Number(document.getElementById('m-likes').value)||0,
        comments:Number(document.getElementById('m-comments').value)||0,
        shares:Number(document.getElementById('m-shares').value)||0,
        saves:Number(document.getElementById('m-saves').value)||0,
        reach:Number(document.getElementById('m-reach').value)||0,
        clicks:Number(document.getElementById('m-clicks').value)||0,
        leads:Number(document.getElementById('m-leads').value)||0,
        conversions:Number(document.getElementById('m-conversions').value)||0,
        spend:Number(document.getElementById('m-spend').value)||0,
        revenue:Number(document.getElementById('m-revenue').value)||0,
        watchTime:Number(document.getElementById('m-watchtime').value)||0,
        avgDuration:Number(document.getElementById('m-avgdur').value)||0,
        followers:Number(document.getElementById('m-followers').value)||0,
        ctr:Number(document.getElementById('m-ctr').value)||0,
        er:Number(document.getElementById('m-er').value)||0,
        notes:document.getElementById('m-notes').value
      });
      btn.disabled=false;btn.textContent='Save Metrics';
      if(!saved){showToast('Error saving','error');return;}
      showToast('Metrics saved!','success');
      closeModal();await refresh();
    }

    async function delMetric(id){
      if(!confirm('Delete this metric?'))return;
      await DB.deleteMetric(id);showToast('Deleted','info');await refresh();
    }

    document.getElementById('metrics-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  </script>
</body>
</html>
