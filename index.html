<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>neOwn — Content Studio</title>
<link rel="stylesheet" href="shared.css"/>
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Ambient orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(80px);
}
.orb1 {
  width: 560px; height: 560px;
  background: radial-gradient(circle, rgba(240,0,140,0.08), transparent 60%);
  top: -200px; left: -100px;
}
.orb2 {
  width: 440px; height: 440px;
  background: radial-gradient(circle, rgba(110,91,255,0.10), transparent 60%);
  bottom: -120px; right: -60px;
}
.orb3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0,204,122,0.05), transparent 60%);
  top: 40%; left: 60%;
}

/* Wrap */
.auth-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 20px;
}

/* Logo */
.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}
.auth-logo img {
  height: 34px;
  width: auto;
  display: inline-block;
}
.auth-logo p {
  font-size: 13px;
  color: var(--text3);
  margin-top: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
}

/* Card */
.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 30px;
  box-shadow: var(--shadow), 0 0 80px rgba(240,0,140,0.04);
  position: relative;
  overflow: hidden;
}
/* Subtle top glow line */
.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,0,140,0.45), transparent);
}

/* Tabs */
.auth-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 26px;
  gap: 2px;
}
.auth-tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  border-radius: 7px;
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.auth-tab.active {
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  color: #fff;
  box-shadow: 0 3px 12px var(--pink-glow);
}

/* Forms */
.auth-form { display: none; }
.auth-form.active { display: block; animation: fadeIn 0.25s ease; }
.auth-form h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.auth-form .sub {
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 24px;
}

/* Input wrapper */
.inp-wrap { position: relative; }
.inp-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
.inp-wrap .input-field { padding-left: 36px; }

.pwd-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  transition: color 0.15s;
}
.pwd-eye:hover { color: var(--text); }

/* Form groups */
.auth-form .form-group { margin-bottom: 14px; }

/* Submit button */
.auth-submit {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
  box-shadow: 0 4px 18px var(--pink-glow);
  position: relative;
  overflow: hidden;
}
.auth-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.auth-submit:hover::before { opacity: 1; }
.auth-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--pink-glow); }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* Messages */
.err-msg {
  background: rgba(255,68,102,0.10);
  border: 1px solid rgba(255,68,102,0.28);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12.5px;
  color: var(--red);
  margin-bottom: 14px;
  display: none;
}
.err-msg.show { display: block; animation: fadeIn 0.2s ease; }

.ok-msg {
  background: rgba(0,204,122,0.10);
  border: 1px solid rgba(0,204,122,0.28);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12.5px;
  color: var(--green);
  margin-bottom: 14px;
  display: none;
}
.ok-msg.show { display: block; animation: fadeIn 0.2s ease; }

/* Feature grid */
.feat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 24px;
}
.feat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}
.feat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="auth-wrap">
  <div class="auth-logo">
    <img src="https://neown.in/cdn/shop/files/neOwn_website_logo_4f4f6dc2-8b02-4ac7-bfda-842abc1992f8.png?v=1745232656&width=500" alt="neOwn"/>
    <p>Internal Content Studio</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="auth-form active" id="login-form">
      <h2>Welcome back 👋</h2>
      <p class="sub">Sign in to your neOwn Studio account</p>
      <div class="err-msg" id="login-error"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input type="email" class="input-field" id="login-email" placeholder="you@neown.in"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input type="password" class="input-field" id="login-pwd" placeholder="Your password"/>
          <button class="pwd-eye" onclick="togglePwd('login-pwd',this)">👁</button>
        </div>
      </div>
      <button class="auth-submit" id="login-btn" onclick="doLogin()">Sign In →</button>
      <p style="text-align:center;font-size:12.5px;color:var(--text3);margin-top:16px">
        No account? <a onclick="switchTab('signup')" style="color:var(--pink-light);cursor:pointer;font-weight:600;">Sign up</a>
      </p>
    </div>

    <div class="auth-form" id="signup-form">
      <h2>Create account ✨</h2>
      <p class="sub">Join the neOwn content team</p>
      <div class="err-msg" id="signup-error"></div>
      <div class="ok-msg" id="signup-ok"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="inp-wrap">
          <span class="inp-icon">👤</span>
          <input type="text" class="input-field" id="signup-name" placeholder="Your name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input type="email" class="input-field" id="signup-email" placeholder="you@neown.in"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input type="password" class="input-field" id="signup-pwd" placeholder="Min 6 chars"/>
          <button class="pwd-eye" onclick="togglePwd('signup-pwd',this)">👁</button>
        </div>
      </div>
      <button class="auth-submit" id="signup-btn" onclick="doSignup()">Create Account →</button>
      <div class="feat-grid">
        <div class="feat-item"><div class="feat-dot" style="background:var(--pink)"></div>AI Content Studio</div>
        <div class="feat-item"><div class="feat-dot" style="background:var(--indigo)"></div>Content Calendar</div>
        <div class="feat-item"><div class="feat-dot" style="background:var(--green)"></div>Content Bank</div>
        <div class="feat-item"><div class="feat-dot" style="background:var(--amber)"></div>Performance</div>
      </div>
    </div>
  </div>
</div>

<div id="global-toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
(async()=>{ const {data:{session}}=await window._sb.auth.getSession(); if(session) location.href='dashboard.html'; })();

function switchTab(t){
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('login-form').classList.toggle('active',t==='login');
  document.getElementById('signup-form').classList.toggle('active',t==='signup');
}
function togglePwd(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),5000);}
function setBtn(id,loading){const b=document.getElementById(id);b.disabled=loading;b.textContent=loading?'Please wait...':(id==='login-btn'?'Sign In →':'Create Account →');}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  if(!email||!pwd)return showErr('login-error','Fill in all fields');
  setBtn('login-btn',true);
  const r=await Auth.login(email,pwd);
  setBtn('login-btn',false);
  if(r.success)location.href='dashboard.html';else showErr('login-error',r.error);
}

async function doSignup(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pwd=document.getElementById('signup-pwd').value;
  if(!name||!email||!pwd)return showErr('signup-error','Fill in all fields');
  if(pwd.length<6)return showErr('signup-error','Password must be 6+ characters');
  setBtn('signup-btn',true);
  const r=await Auth.signup(name,email,pwd);
  setBtn('signup-btn',false);
  if(r.success){
    if(r.needsConfirmation){
      const ok=document.getElementById('signup-ok');
      ok.textContent='✅ Check your email to confirm, then sign in!';
      ok.classList.add('show');
    }else location.href='dashboard.html';
  }else showErr('signup-error',r.error);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    document.getElementById('login-form').classList.contains('active')?doLogin():doSignup();
  }
});
</script>
</body>
</html>
